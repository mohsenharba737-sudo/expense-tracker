<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>Expense Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app">
    <div class="card">

      <!-- Header -->
      <div class="header">
        <div>
          <div class="title" id="titleText">متتبع المصاريف</div>
          <div class="subtitle" id="subtitleText">تابع دخلك ومصاريفك بسهولة</div>
        </div>

        <div class="header-buttons">
          <button class="toggle-lang" id="langToggle">
            🌐 <span id="langText">English</span>
          </button>

          <button class="toggle-theme" id="themeToggle">
            <span id="themeIcon">🌙</span>
            <span id="themeText">الوضع الليلي</span>
          </button>
        </div>
      </div>

      <!-- Balance Card -->
      <div class="balance-card">
        <div class="balance-label" id="balanceLabel">الرصيد الحالي</div>
        <div id="balance" class="balance-value">0 ر.س</div>

        <div class="summary">
          <div class="summary-item">
            <div class="summary-label" id="incomeLabel">إجمالي الدخل</div>
            <div id="totalIncome" class="summary-value income">0 ر.س</div>
          </div>

          <div class="summary-item">
            <div class="summary-label" id="expenseLabel">إجمالي المصروف</div>
            <div id="totalExpense" class="summary-value expense">0 ر.س</div>
          </div>
        </div>
      </div>

      <!-- Form -->
      <form id="transactionForm" class="form">
        <div class="field">
          <label id="typeLabel">النوع</label>
          <select id="type">
            <option value="income" id="incomeOption">دخل</option>
            <option value="expense" id="expenseOption">مصروف</option>
          </select>
        </div>

        <div class="field">
          <label id="descLabel">الوصف</label>
          <input id="title" type="text" placeholder="مثال: راتب، مطعم..." required />
        </div>

        <div class="field">
          <label id="amountLabel">المبلغ</label>
          <input id="amount" type="number" step="0.01" min="0" placeholder="0.00" required />
        </div>

        <div class="actions">
          <button class="btn-primary" type="submit" id="addBtn">➕ إضافة عملية</button>
          <button class="btn-outline" type="button" id="clearAll">🧹 مسح الكل</button>
        </div>
      </form>

      <!-- Transactions -->
      <div class="transactions-header">
        <strong id="operationsLabel">العمليات</strong>
        <span id="countLabel">0 عملية</span>
      </div>

      <div id="transactionsList" class="transactions"></div>
      <div id="emptyState" class="empty">لا توجد عمليات بعد، ابدأ بإضافة أول عملية.</div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
